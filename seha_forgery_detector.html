<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seha Sick Leave Authenticity Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-900: #04342C;
    --green-800: #085041;
    --green-700: #0F6E56;
    --green-500: #1D9E75;
    --green-300: #5DCAA8;
    --green-100: #9FE1CB;
    --green-50:  #E1F5EE;
    --red-800: #791F1F;
    --red-600: #A32D2D;
    --red-400: #E24B4A;
    --red-100: #F7C1C1;
    --red-50:  #FCEBEB;
    --amber-800: #633806;
    --amber-600: #854F0B;
    --amber-400: #BA7517;
    --amber-100: #FAC775;
    --amber-50:  #FAEEDA;
    --gray-900: #1A1A1A;
    --gray-700: #444441;
    --gray-500: #888780;
    --gray-300: #B4B2A9;
    --gray-100: #D3D1C7;
    --gray-50:  #F5F4F0;
    --surface: #FFFFFF;
    --surface-alt: #F8F7F4;
    --text-primary: #1A1A1A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: #E0DED7;
    --border-strong: #C4C2BA;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body { background: var(--gray-50); color: var(--text-primary); min-height: 100vh; }

  .topbar {
    background: var(--green-800); padding: 14px 24px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-icon {
    width: 38px; height: 38px; background: var(--green-500);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar-icon svg { width: 20px; height: 20px; stroke: var(--green-50); fill: none; stroke-width: 2; stroke-linecap: round; }
  .topbar-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-sub { color: var(--green-100); font-size: 12px; margin-top: 1px; }
  .topbar-badge {
    margin-left: auto; background: var(--green-700); color: var(--green-100);
    font-size: 11px; padding: 4px 10px; border-radius: 99px; letter-spacing: 0.03em;
  }

  .main { max-width: 780px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── API Key Panel ── */
  .key-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 24px; margin-bottom: 20px;
  }
  .key-panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .key-lock { font-size: 20px; }
  .key-panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .key-panel-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .key-input-row { display: flex; gap: 10px; }
  .key-input {
    flex: 1; padding: 10px 14px; font-size: 13px;
    border: 1px solid var(--border-strong); border-radius: var(--radius-md);
    background: var(--surface-alt); color: var(--text-primary);
    font-family: 'Courier New', monospace; letter-spacing: 0.02em;
    outline: none; transition: border-color 0.15s;
  }
  .key-input:focus { border-color: var(--green-500); }
  .key-input::placeholder { color: var(--text-tertiary); letter-spacing: 0; font-family: inherit; }
  .key-save-btn {
    padding: 10px 18px; background: var(--green-700); color: #fff;
    border: none; border-radius: var(--radius-md); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .key-save-btn:hover { background: var(--green-800); }
  .key-status {
    margin-top: 10px; font-size: 12px; padding: 8px 12px;
    border-radius: var(--radius-sm); display: none;
  }
  .key-status.ok { display: block; background: var(--green-50); color: var(--green-800); border: 1px solid var(--green-100); }
  .key-status.err { display: block; background: var(--red-50); color: var(--red-600); border: 1px solid var(--red-100); }

  /* ── Upload panel ── */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-xl); padding: 28px; margin-bottom: 20px;
  }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }
  .panel.locked { opacity: 0.45; pointer-events: none; user-select: none; }

  .drop-zone {
    border: 2px dashed var(--border-strong); border-radius: var(--radius-lg);
    padding: 40px 24px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative; background: var(--surface-alt);
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--green-500); background: var(--green-50); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .drop-main { font-size: 15px; color: var(--text-primary); font-weight: 500; }
  .drop-main span { color: var(--green-700); text-decoration: underline; }
  .drop-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

  .file-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: var(--green-50);
    border: 1px solid var(--green-100); border-radius: var(--radius-md); margin-top: 14px;
  }
  .file-row-icon { font-size: 24px; }
  .file-row-info { flex: 1; }
  .file-row-name { font-size: 13px; font-weight: 500; color: var(--green-800); }
  .file-row-size { font-size: 11px; color: var(--green-700); margin-top: 2px; }
  .file-row-remove {
    background: none; border: none; cursor: pointer;
    color: var(--green-700); font-size: 16px; padding: 4px 6px; border-radius: 4px; line-height: 1;
  }
  .file-row-remove:hover { background: var(--red-50); color: var(--red-400); }

  .analyze-btn {
    width: 100%; margin-top: 16px; padding: 13px 20px;
    background: var(--green-700); color: #fff; border: none;
    border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: background 0.15s, transform 0.1s; letter-spacing: -0.01em;
  }
  .analyze-btn:hover:not(:disabled) { background: var(--green-800); }
  .analyze-btn:active:not(:disabled) { transform: scale(0.99); }
  .analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .analyze-btn svg { width: 17px; height: 17px; }

  .status-bar {
    display: none; align-items: center; gap: 10px; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 20px;
    font-size: 13px; color: var(--text-secondary);
  }
  .status-bar.show { display: flex; }
  .spinner {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 2px solid var(--border); border-top-color: var(--green-500);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: var(--surface); border-radius: var(--radius-xl);
    border: 2px solid var(--border); overflow: hidden;
  }
  .result-card.forged   { border-color: var(--red-400); }
  .result-card.authentic { border-color: var(--green-500); }
  .result-card.inconclusive { border-color: var(--amber-400); }

  .verdict-banner { padding: 20px 24px; display: flex; align-items: center; gap: 14px; }
  .verdict-banner.forged      { background: var(--red-50); }
  .verdict-banner.authentic   { background: var(--green-50); }
  .verdict-banner.inconclusive { background: var(--amber-50); }

  .verdict-icon {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .verdict-icon.forged      { background: var(--red-400); }
  .verdict-icon.authentic   { background: var(--green-500); }
  .verdict-icon.inconclusive { background: var(--amber-400); }

  .verdict-text h2 { font-size: 18px; font-weight: 700; }
  .verdict-text h2.forged      { color: var(--red-600); }
  .verdict-text h2.authentic   { color: var(--green-800); }
  .verdict-text h2.inconclusive { color: var(--amber-600); }
  .verdict-text p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .confidence-pill {
    margin-left: auto; flex-shrink: 0;
    font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 99px;
  }
  .confidence-pill.forged      { background: var(--red-100); color: var(--red-800); }
  .confidence-pill.authentic   { background: var(--green-100); color: var(--green-900); }
  .confidence-pill.inconclusive { background: var(--amber-100); color: var(--amber-800); }

  .summary-section { padding: 18px 24px; border-top: 1px solid var(--border); }
  .summary-section p { font-size: 14px; line-height: 1.65; color: var(--text-secondary); }

  .checks-section { padding: 0 24px 20px; }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-tertiary); margin-bottom: 10px; padding-top: 16px;
  }

  .check-list { display: flex; flex-direction: column; gap: 7px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px;
    border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface-alt);
  }
  .check-item.fail { border-color: var(--red-100); background: var(--red-50); }
  .check-item.warn { border-color: var(--amber-100); background: var(--amber-50); }
  .check-item.pass { border-color: #C0DD97; background: #EAF3DE; }

  .check-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 11px;
  }
  .check-dot.pass    { background: var(--green-500); color: #fff; }
  .check-dot.fail    { background: var(--red-400); color: #fff; }
  .check-dot.warn    { background: var(--amber-400); color: #fff; }
  .check-dot.unknown { background: var(--gray-300); color: #fff; }

  .check-content { flex: 1; }
  .check-name { font-size: 13px; font-weight: 600; }
  .check-name.pass    { color: #3B6D11; }
  .check-name.fail    { color: var(--red-600); }
  .check-name.warn    { color: var(--amber-600); }
  .check-name.unknown { color: var(--text-secondary); }
  .check-detail { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
  .check-item.fail .check-detail { color: var(--red-600); }
  .check-item.warn .check-detail { color: var(--amber-600); }

  .fields-section { padding: 16px 24px 24px; border-top: 1px solid var(--border); }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .field-item { padding: 10px 13px; background: var(--surface-alt); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); }
  .field-value { font-size: 13px; color: var(--text-primary); margin-top: 4px; font-weight: 500; word-break: break-all; }

  .error-box {
    padding: 14px 18px; border-radius: var(--radius-md);
    background: var(--red-50); border: 1px solid var(--red-100);
    color: var(--red-600); font-size: 13px; line-height: 1.6; margin-bottom: 20px;
  }

  .footer { text-align: center; padding: 32px 24px 16px; font-size: 12px; color: var(--text-tertiary); }
  .footer a { color: var(--green-700); text-decoration: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <div>
    <div class="topbar-title">Sick Leave Authenticity Checker</div>
    <div class="topbar-sub">Seha / Saudi MOH — Forgery Detection</div>
  </div>
  <span class="topbar-badge">AI Powered</span>
</div>

<div class="main">

  <div class="key-panel">
    <div class="key-panel-header">
      <span class="key-lock">🔑</span>
      <div>
        <div class="key-panel-title">Gemini API Key</div>
        <div class="key-panel-sub">Using your provided key for analysis</div>
      </div>
    </div>
    <div class="key-input-row">
      <input class="key-input" type="password" id="apiKeyInput" value="AIzaSyAlm1Xdp-je850CVq11C00l90pu3kkIiaU" autocomplete="off" spellcheck="false">
      <button class="key-save-btn" id="keySaveBtn">Save key</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
  </div>

  <div class="panel locked" id="uploadPanel">
    <div class="panel-title">Upload document</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,image/*">
      <span class="drop-icon">📋</span>
      <div class="drop-main">Drop sick leave file here, or <span>browse</span></div>
      <div class="drop-sub">Accepts PDF, JPG, PNG, WEBP</div>
    </div>
    <div id="fileRow" style="display:none;" class="file-row">
      <span class="file-row-icon" id="fileIcon">📄</span>
      <div class="file-row-info">
        <div class="file-row-name" id="fileName"></div>
        <div class="file-row-size" id="fileSize"></div>
      </div>
      <button class="file-row-remove" id="removeBtn">✕</button>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Analyze document
    </button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Reading document...</span>
  </div>

  <div class="error-box" id="errorBox" style="display:none;"></div>
  <div id="resultArea"></div>

</div>

<script>
const SYSTEM_PROMPT = `Analyze Saudi Arabian Seha (صحتي) sick leave report authentication. Detect signs of forgery.

A genuine report must have:
1. QR code linking to https://www.seha.sa/#/inquiries/slenquiry
2. ID: PSL + 14 digits
3. Seha logo & KSA header
4. National Health Information Centre logo (bottom right)
5. Hospital info & 16-digit license starting with 38 (bottom left)
6. Consistent dates: admission <= discharge <= issue date
7. Print timestamp at bottom left

Return ONLY JSON:
{
  "verdict": "FORGED|AUTHENTIC|INCONCLUSIVE",
  "confidence": "High|Medium|Low",
  "summary": "2-3 sentences",
  "checks": [
    {"name": "Check Name", "status": "PASS|FAIL|WARN|UNKNOWN", "detail": "findings"}
  ],
  "extractedFields": {
    "leaveId": "", "patientName": "", "nationalId": "", "nationality": "", 
    "hospital": "", "licenseNumber": "", "practitioner": "", 
    "admissionDate": "", "dischargeDate": "", "issueDate": "", 
    "printTimestamp": "", "employer": ""
  }
}`;

const KEY_STORAGE = 'seha_gemini_key_v3';
let apiKey = localStorage.getItem(KEY_STORAGE) || document.getElementById('apiKeyInput').value;

const apiKeyInput = document.getElementById('apiKeyInput');
const keySaveBtn = document.getElementById('keySaveBtn');
const keyStatus = document.getElementById('keyStatus');
const uploadPanel = document.getElementById('uploadPanel');

function applyKeyState() {
  if (apiKey && apiKey.startsWith('AIzaSy')) {
    uploadPanel.classList.remove('locked');
    apiKeyInput.value = apiKey;
    keyStatus.className = 'key-status ok';
    keyStatus.textContent = '✓ Ready for analysis';
    keyStatus.style.display = 'block';
  } else {
    uploadPanel.classList.add('locked');
  }
}

keySaveBtn.addEventListener('click', () => {
  apiKey = apiKeyInput.value.trim();
  localStorage.setItem(KEY_STORAGE, apiKey);
  applyKeyState();
});

applyKeyState();

let fileData = null;
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileRow = document.getElementById('fileRow');
const fileName = document.getElementById('fileName');
const fileSizeEl = document.getElementById('fileSize');
const analyzeBtn = document.getElementById('analyzeBtn');
const statusBar = document.getElementById('statusBar');
const errorBox = document.getElementById('errorBox');
const resultArea = document.getElementById('resultArea');

function loadFile(file) {
  fileName.textContent = file.name;
  fileSizeEl.textContent = (file.size/1024).toFixed(1) + ' KB';
  fileRow.style.display = 'flex';
  analyzeBtn.disabled = false;
  const reader = new FileReader();
  reader.onload = e => {
    fileData = { 
        base64: e.target.result.split(',')[1], 
        mediaType: file.type || 'image/jpeg' 
    };
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

analyzeBtn.addEventListener('click', async () => {
  analyzeBtn.disabled = true;
  errorBox.style.display = 'none';
  statusBar.classList.add('show');
  
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
    
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        generationConfig: { responseMimeType: "application/json" },
        contents: [{
          parts: [
            { inlineData: { mimeType: fileData.mediaType, data: fileData.base64 } },
            { text: "Analyze this document for authenticity." }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || "API Error");
    
    const result = JSON.parse(data.candidates[0].content.parts[0].text);
    renderResult(result);
  } catch (err) {
    errorBox.textContent = "Error: " + err.message;
    errorBox.style.display = 'block';
  } finally {
    analyzeBtn.disabled = false;
    statusBar.classList.remove('show');
  }
});

function renderResult(data) {
  const v = (data.verdict || 'inconclusive').toLowerCase();
  const checks = (data.checks || []).map(c => `
    <div class="check-item ${c.status.toLowerCase()}">
      <div class="check-dot ${c.status.toLowerCase()}">${c.status === 'PASS' ? '✓' : '✕'}</div>
      <div class="check-content">
        <div class="check-name">${c.name}</div>
        <div class="check-detail">${c.detail}</div>
      </div>
    </div>
  `).join('');

  resultArea.innerHTML = `
    <div class="result-card ${v}">
      <div class="verdict-banner ${v}">
        <div class="verdict-text">
          <h2 class="${v}">${data.verdict}</h2>
          <p>${data.confidence} Confidence</p>
        </div>
      </div>
      <div class="summary-section"><p>${data.summary}</p></div>
      <div class="checks-section"><div class="check-list">${checks}</div></div>
    </div>`;
}
</script>
</body>
</html>

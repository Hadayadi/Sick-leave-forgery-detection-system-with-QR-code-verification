<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seha Sick Leave Authenticity Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-900: #04342C;
    --green-800: #085041;
    --green-700: #0F6E56;
    --green-500: #1D9E75;
    --green-300: #5DCAA8;
    --green-100: #9FE1CB;
    --green-50:  #E1F5EE;

    --red-800: #791F1F;
    --red-600: #A32D2D;
    --red-400: #E24B4A;
    --red-100: #F7C1C1;
    --red-50:  #FCEBEB;

    --amber-800: #633806;
    --amber-600: #854F0B;
    --amber-400: #BA7517;
    --amber-100: #FAC775;
    --amber-50:  #FAEEDA;

    --gray-900: #1A1A1A;
    --gray-700: #444441;
    --gray-500: #888780;
    --gray-300: #B4B2A9;
    --gray-100: #D3D1C7;
    --gray-50:  #F5F4F0;

    --surface: #FFFFFF;
    --surface-alt: #F8F7F4;
    --text-primary: #1A1A1A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: #E0DED7;
    --border-strong: #C4C2BA;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;

    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--gray-50);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Top Bar ── */
  .topbar {
    background: var(--green-800);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-icon {
    width: 38px; height: 38px;
    background: var(--green-500);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-icon svg { width: 20px; height: 20px; stroke: var(--green-50); fill: none; stroke-width: 2; stroke-linecap: round; }
  .topbar-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-sub { color: var(--green-100); font-size: 12px; margin-top: 1px; }
  .topbar-badge {
    margin-left: auto;
    background: var(--green-700);
    color: var(--green-100);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 0.03em;
  }

  /* ── Main layout ── */
  .main { max-width: 780px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── Upload panel ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 28px;
    margin-bottom: 20px;
  }

  .panel-title { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }

  .drop-zone {
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    background: var(--surface-alt);
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--green-500); background: var(--green-50); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 36px; margin-bottom: 12px; display: block; }
  .drop-main { font-size: 15px; color: var(--text-primary); font-weight: 500; }
  .drop-main span { color: var(--green-700); text-decoration: underline; }
  .drop-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

  .file-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--green-50);
    border: 1px solid var(--green-100);
    border-radius: var(--radius-md);
    margin-top: 14px;
  }
  .file-row-icon { font-size: 24px; }
  .file-row-info { flex: 1; }
  .file-row-name { font-size: 13px; font-weight: 500; color: var(--green-800); }
  .file-row-size { font-size: 11px; color: var(--green-700); margin-top: 2px; }
  .file-row-remove {
    background: none; border: none; cursor: pointer;
    color: var(--green-700); font-size: 16px; padding: 4px 6px;
    border-radius: 4px; line-height: 1;
  }
  .file-row-remove:hover { background: var(--red-50); color: var(--red-400); }

  .analyze-btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px 20px;
    background: var(--green-700);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .analyze-btn:hover:not(:disabled) { background: var(--green-800); }
  .analyze-btn:active:not(:disabled) { transform: scale(0.99); }
  .analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .analyze-btn svg { width: 17px; height: 17px; }

  /* ── Status bar ── */
  .status-bar {
    display: none;
    align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .status-bar.show { display: flex; }
  .spinner {
    width: 16px; height: 16px; flex-shrink: 0;
    border: 2px solid var(--border);
    border-top-color: var(--green-500);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result card ── */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 2px solid var(--border);
    overflow: hidden;
  }
  .result-card.forged  { border-color: var(--red-400); }
  .result-card.authentic { border-color: var(--green-500); }
  .result-card.inconclusive { border-color: var(--amber-400); }

  .verdict-banner {
    padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .verdict-banner.forged { background: var(--red-50); }
  .verdict-banner.authentic { background: var(--green-50); }
  .verdict-banner.inconclusive { background: var(--amber-50); }

  .verdict-icon {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .verdict-icon.forged { background: var(--red-400); }
  .verdict-icon.authentic { background: var(--green-500); }
  .verdict-icon.inconclusive { background: var(--amber-400); }

  .verdict-text h2 { font-size: 18px; font-weight: 700; }
  .verdict-text h2.forged { color: var(--red-600); }
  .verdict-text h2.authentic { color: var(--green-800); }
  .verdict-text h2.inconclusive { color: var(--amber-600); }
  .verdict-text p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .confidence-pill {
    margin-left: auto; flex-shrink: 0;
    font-size: 12px; font-weight: 600; padding: 5px 13px;
    border-radius: 99px;
  }
  .confidence-pill.forged { background: var(--red-100); color: var(--red-800); }
  .confidence-pill.authentic { background: var(--green-100); color: var(--green-900); }
  .confidence-pill.inconclusive { background: var(--amber-100); color: var(--amber-800); }

  .summary-section {
    padding: 18px 24px;
    border-top: 1px solid var(--border);
  }
  .summary-section p { font-size: 14px; line-height: 1.65; color: var(--text-secondary); }

  .checks-section { padding: 0 24px 20px; }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-tertiary);
    margin-bottom: 10px; padding-top: 16px;
  }

  .check-list { display: flex; flex-direction: column; gap: 7px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--surface-alt);
  }
  .check-item.fail { border-color: var(--red-100); background: var(--red-50); }
  .check-item.warn { border-color: var(--amber-100); background: var(--amber-50); }
  .check-item.pass { border-color: #C0DD97; background: #EAF3DE; }

  .check-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 11px; margin-top: 0px;
  }
  .check-dot.pass { background: var(--green-500); color: #fff; }
  .check-dot.fail { background: var(--red-400); color: #fff; }
  .check-dot.warn { background: var(--amber-400); color: #fff; }
  .check-dot.unknown { background: var(--gray-300); color: #fff; }

  .check-content { flex: 1; }
  .check-name { font-size: 13px; font-weight: 600; }
  .check-name.pass { color: #3B6D11; }
  .check-name.fail { color: var(--red-600); }
  .check-name.warn { color: var(--amber-600); }
  .check-name.unknown { color: var(--text-secondary); }
  .check-detail { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }
  .check-item.fail .check-detail { color: var(--red-600); }
  .check-item.warn .check-detail { color: var(--amber-600); }

  /* ── Extracted data ── */
  .fields-section {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
  }
  .fields-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 10px;
  }
  .field-item { padding: 10px 13px; background: var(--surface-alt); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); }
  .field-value { font-size: 13px; color: var(--text-primary); margin-top: 4px; font-weight: 500; word-break: break-all; }

  /* ── Error ── */
  .error-box {
    padding: 14px 18px; border-radius: var(--radius-md);
    background: var(--red-50); border: 1px solid var(--red-100);
    color: var(--red-600); font-size: 13px; line-height: 1.6;
    margin-bottom: 20px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 32px 24px 16px;
    font-size: 12px; color: var(--text-tertiary);
  }
  .footer a { color: var(--green-700); text-decoration: none; }

  @media (max-width: 540px) {
    .main { padding: 16px 12px 60px; }
    .panel { padding: 18px; }
    .fields-grid { grid-template-columns: 1fr; }
    .topbar-badge { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </div>
  <div>
    <div class="topbar-title">Sick Leave Authenticity Checker</div>
    <div class="topbar-sub">Seha / Saudi MOH — Forgery Detection</div>
  </div>
  <span class="topbar-badge">AI-powered</span>
</div>

<div class="main">

  <div class="panel">
    <div class="panel-title">Upload document</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,image/*">
      <span class="drop-icon">📋</span>
      <div class="drop-main">Drop sick leave file here, or <span>browse</span></div>
      <div class="drop-sub">Accepts PDF, JPG, PNG, WEBP</div>
    </div>
    <div id="fileRow" style="display:none;" class="file-row">
      <span class="file-row-icon" id="fileIcon">📄</span>
      <div class="file-row-info">
        <div class="file-row-name" id="fileName"></div>
        <div class="file-row-size" id="fileSize"></div>
      </div>
      <button class="file-row-remove" id="removeBtn">✕</button>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Analyze document
    </button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Reading document...</span>
  </div>

  <div class="error-box" id="errorBox" style="display:none;"></div>

  <div id="resultArea"></div>

</div>

<div class="footer">
  Verify documents at <a href="https://www.seha.sa/#/inquiries/slenquiry" target="_blank">www.seha.sa/#/inquiries/slenquiry</a>
  &nbsp;·&nbsp; Powered by Claude AI
</div>

<script>
const SYSTEM_PROMPT = `You are a forensic document analyst specializing in Saudi Arabian Seha (صحة) sick leave report authentication. Analyze uploaded sick leave documents and detect signs of forgery.

A genuine Seha sick leave report (تقرير إجازة مرضية) must have ALL of these:
1. QR code that links to https://www.seha.sa/#/inquiries/slenquiry — MOST CRITICAL check
2. Leave ID in format PSL followed by 14 digits (e.g. PSL25080724757)
3. Seha logo (صحة / Seha) and Kingdom of Saudi Arabia header
4. National Health Information Centre logo at bottom right
5. Hospital name and license number at bottom left (رقم الترخيص), 16-digit format starting with 38
6. Verification text: www.seha.sa/#/inquiries/slenquiry
7. Practitioner name and position (General/طبيب عام or specialist)
8. Logically consistent dates: admission ≤ discharge ≤ issue date
9. Leave duration matches date range
10. Print timestamp at bottom left (time + date PDF was generated)

Common forgery signs:
- QR code missing, blurry, or wrong URL
- Dates inconsistent or in the future relative to issue
- Print date much later than issue date (>7 days gap is suspicious)
- Employer field filled in (genuine documents leave it blank)
- Inconsistent fonts or obvious text edits
- Leave ID missing or wrong format
- Hospital license number wrong format
- Missing National Health Information Centre branding
- Text that appears overlaid or different color/font from rest of document

Respond ONLY in this exact JSON (no markdown fences, no extra text):
{
  "verdict": "FORGED",
  "confidence": "High",
  "summary": "Brief 2-3 sentence finding summary",
  "checks": [
    {"name": "Check name", "status": "PASS", "detail": "What was found"}
  ],
  "extractedFields": {
    "leaveId": "",
    "patientName": "",
    "nationalId": "",
    "nationality": "",
    "hospital": "",
    "licenseNumber": "",
    "practitioner": "",
    "admissionDate": "",
    "dischargeDate": "",
    "issueDate": "",
    "printTimestamp": "",
    "employer": ""
  }
}

Verdict options: FORGED | AUTHENTIC | INCONCLUSIVE
Status options: PASS | FAIL | WARN | UNKNOWN
Always include these 10 checks in order: QR Code Destination, Leave ID Format, Document Structure, Date Consistency, Leave Duration Match, Hospital License Number, Verification URL, Print Timestamp, Visual Integrity, Seha Branding.`;

let fileData = null;

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileRow    = document.getElementById('fileRow');
const fileIcon   = document.getElementById('fileIcon');
const fileName   = document.getElementById('fileName');
const fileSizeEl = document.getElementById('fileSize');
const removeBtn  = document.getElementById('removeBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const statusBar  = document.getElementById('statusBar');
const statusText = document.getElementById('statusText');
const errorBox   = document.getElementById('errorBox');
const resultArea = document.getElementById('resultArea');

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  fileIcon.textContent = ext === 'pdf' ? '📄' : '🖼️';
  fileName.textContent = file.name;
  fileSizeEl.textContent = fmtSize(file.size);
  fileRow.style.display = 'flex';
  analyzeBtn.disabled = false;
  clearResults();

  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    let mediaType = 'image/jpeg';
    if (ext === 'pdf') mediaType = 'application/pdf';
    else if (ext === 'png') mediaType = 'image/png';
    else if (ext === 'webp') mediaType = 'image/webp';
    fileData = { base64, mediaType };
  };
  reader.readAsDataURL(file);
}

function clearResults() {
  resultArea.innerHTML = '';
  errorBox.style.display = 'none';
  statusBar.classList.remove('show');
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
removeBtn.addEventListener('click', () => {
  fileData = null;
  fileRow.style.display = 'none';
  analyzeBtn.disabled = true;
  fileInput.value = '';
  clearResults();
});

function setStatus(text) {
  statusText.textContent = text;
  statusBar.classList.add('show');
}

function statusToClass(s) {
  s = (s || '').toUpperCase();
  if (s === 'PASS') return 'pass';
  if (s === 'FAIL') return 'fail';
  if (s === 'WARN') return 'warn';
  return 'unknown';
}

function statusIcon(s) {
  if (s === 'pass') return '✓';
  if (s === 'fail') return '✕';
  if (s === 'warn') return '!';
  return '?';
}

function renderResult(data) {
  const vRaw = (data.verdict || 'inconclusive').toLowerCase();
  const v = ['forged','authentic','inconclusive'].includes(vRaw) ? vRaw : 'inconclusive';

  const vLabel = v === 'forged' ? 'Suspected Forgery' : v === 'authentic' ? 'Appears Authentic' : 'Inconclusive';
  const vEmoji = v === 'forged' ? '🚨' : v === 'authentic' ? '✅' : '⚠️';

  const checksHtml = (data.checks || []).map(c => {
    const sc = statusToClass(c.status);
    return `<div class="check-item ${sc}">
      <div class="check-dot ${sc}">${statusIcon(sc)}</div>
      <div class="check-content">
        <div class="check-name ${sc}">${c.name || ''}</div>
        ${c.detail ? `<div class="check-detail">${c.detail}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const f = data.extractedFields || {};
  const pairs = [
    ['Leave ID', f.leaveId], ['Patient name', f.patientName],
    ['National ID', f.nationalId], ['Nationality', f.nationality],
    ['Hospital', f.hospital], ['License no.', f.licenseNumber],
    ['Practitioner', f.practitioner], ['Admission', f.admissionDate],
    ['Discharge', f.dischargeDate], ['Issue date', f.issueDate],
    ['Print time', f.printTimestamp], ['Employer', f.employer]
  ].filter(([, val]) => val && val.trim() !== '' && val !== 'N/A');

  const fieldsHtml = pairs.length ? `
    <div class="fields-section">
      <div class="section-label">Extracted document data</div>
      <div class="fields-grid">
        ${pairs.map(([l, v]) => `<div class="field-item"><div class="field-label">${l}</div><div class="field-value">${v}</div></div>`).join('')}
      </div>
    </div>` : '';

  resultArea.innerHTML = `
    <div class="result-card ${v}">
      <div class="verdict-banner ${v}">
        <div class="verdict-icon ${v}">${vEmoji}</div>
        <div class="verdict-text">
          <h2 class="${v}">${vLabel}</h2>
          <p>${data.confidence || 'Medium'} confidence · AI analysis</p>
        </div>
        <span class="confidence-pill ${v}">${data.confidence || ''}</span>
      </div>
      <div class="summary-section">
        <p>${data.summary || ''}</p>
      </div>
      <div class="checks-section">
        <div class="section-label">Checks performed</div>
        <div class="check-list">${checksHtml}</div>
      </div>
      ${fieldsHtml}
    </div>`;
}

analyzeBtn.addEventListener('click', async () => {
  if (!fileData) return;
  analyzeBtn.disabled = true;
  analyzeBtn.textContent = 'Analyzing...';
  clearResults();
  setStatus('Sending document to AI for analysis...');

  try {
    const contentBlock = fileData.mediaType === 'application/pdf'
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: fileData.base64 } }
      : { type: 'image', source: { type: 'base64', media_type: fileData.mediaType, data: fileData.base64 } };

    setStatus('Reading document content...');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1800,
        system: SYSTEM_PROMPT,
        messages: [{
          role: 'user',
          content: [
            contentBlock,
            { type: 'text', text: 'Analyze this sick leave document for authenticity and return JSON only.' }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }

    setStatus('Processing results...');
    const data = await resp.json();
    const raw = (data.content || []).map(b => b.text || '').join('').trim();

    let parsed;
    try {
      const clean = raw.replace(/^```json\s*/i, '').replace(/```\s*$/i, '').trim();
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('Could not parse AI response. Raw: ' + raw.slice(0, 300));
    }

    statusBar.classList.remove('show');
    renderResult(parsed);
  } catch (err) {
    statusBar.classList.remove('show');
    errorBox.textContent = '⚠️ Analysis failed: ' + err.message;
    errorBox.style.display = 'block';
  } finally {
    analyzeBtn.disabled = false;

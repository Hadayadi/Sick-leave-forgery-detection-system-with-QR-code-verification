<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seha Sick Leave Authenticity Checker</title>
<style>
  :root {
    --green-800: #085041; --green-700: #0F6E56; --green-500: #1D9E75;
    --red-600: #A32D2D; --gray-50: #F5F4F0; --surface: #FFFFFF;
    --border: #E0DED7; --radius-md: 10px; --radius-xl: 18px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  body { background: var(--gray-50); color: #1A1A1A; padding-bottom: 50px; }
  .topbar { background: var(--green-800); padding: 15px 25px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
  .main { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 25px; margin-bottom: 20px; }
  .key-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: monospace; }
  .btn { background: var(--green-700); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; width: 100%; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .drop-zone { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: var(--radius-xl); cursor: pointer; background: #fafafa; }
  .status { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; font-size: 14px; }
  .status.error { display: block; background: #fdeaea; color: var(--red-600); border: 1px solid #fad2d2; }
  .result-area { margin-top: 20px; }
  .check-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
  .pass { color: var(--green-500); font-weight: bold; }
  .fail { color: var(--red-600); font-weight: bold; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <strong>Sick Leave Authenticity Checker</strong><br>
    <small style="opacity:0.8">Seha / Saudi MOH — Forgery Detection</small>
  </div>
  <span style="font-size:12px; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:20px;">Gemini 3.1 Flash</span>
</div>

<div class="main">
  <!-- Key Entry -->
  <div class="card">
    <label style="font-size:14px; font-weight:600;">🔑 Enter Your Gemini API Key</label>
    <input type="password" id="apiKeyInput" class="key-input" placeholder="AIzaSy...">
    <button class="btn" id="saveKeyBtn">Save Key & Unlock</button>
    <div id="keyInfo" style="font-size:12px; color:#666; margin-top:8px;">Key is stored locally in your browser only.</div>
  </div>

  <!-- Upload Area (Hidden until key is set) -->
  <div id="uploadPanel" style="display:none;">
    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" hidden accept="image/*,.pdf">
        <div style="font-size:30px;">📄</div>
        <strong>Click to upload or drag sick leave file</strong>
        <div style="font-size:12px; color:#666; margin-top:5px;">Supports PDF, JPG, PNG</div>
      </div>
      <div id="selectedFile" style="margin-top:10px; font-size:14px; font-weight:600; text-align:center;"></div>
      <button class="btn" id="analyzeBtn" style="margin-top:20px;" disabled>Analyze Document</button>
    </div>
  </div>

  <div id="statusBox" class="status"></div>
  <div id="resultArea" class="result-area"></div>
</div>

<script>
const SYSTEM_INSTRUCTIONS = "You are a specialized auditor for Saudi Seha sick leave reports. Analyze the provided image/PDF. Look for valid QR codes (seha.sa), consistent serial numbers (PSL+14 digits), correct MOH/Seha branding, and logical date sequences. Output MUST be valid JSON with 'verdict', 'confidence', 'summary', and 'checks' array.";

let currentKey = localStorage.getItem('gemini_seha_key');
let fileBase64 = null;

// Initialize state
if (currentKey) {
  document.getElementById('apiKeyInput').value = currentKey;
  document.getElementById('uploadPanel').style.display = 'block';
}

document.getElementById('saveKeyBtn').onclick = () => {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val.startsWith('AIza')) {
    localStorage.setItem('gemini_seha_key', val);
    currentKey = val;
    document.getElementById('uploadPanel').style.display = 'block';
    alert("Key saved successfully!");
  } else {
    alert("Invalid key format. Should start with AIza...");
  }
};

const dropZone = document.getElementById('dropZone');
dropZone.onclick = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('selectedFile').innerText = "Selected: " + file.name;
  document.getElementById('analyzeBtn').disabled = false;
  
  const reader = new FileReader();
  reader.onload = (ev) => fileBase64 = ev.target.result.split(',')[1];
  reader.readAsDataURL(file);
};

document.getElementById('analyzeBtn').onclick = async () => {
  const status = document.getElementById('statusBox');
  const resultArea = document.getElementById('resultArea');
  const btn = document.getElementById('analyzeBtn');

  status.className = "status"; status.style.display = "block";
  status.innerText = "🔍 Processing with Gemini 3.1 Flash...";
  btn.disabled = true;
  resultArea.innerHTML = "";

  try {
    // Note: Using Gemini 3.1 Flash as of April 2026
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-preview:generateContent?key=${currentKey}`;
    
    const response = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTIONS }] },
        generationConfig: { responseMimeType: "application/json" },
        contents: [{
          parts: [
            { inlineData: { mimeType: "image/jpeg", data: fileBase64 } },
            { text: "Examine this sick leave report for authenticity." }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || "API request failed");

    const analysis = JSON.parse(data.candidates[0].content.parts[0].text);
    renderResult(analysis);
    status.style.display = "none";

  } catch (err) {
    status.className = "status error";
    status.innerText = "❌ Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
};

function renderResult(data) {
  const color = data.verdict === 'AUTHENTIC' ? '#1D9E75' : '#A32D2D';
  let checksHtml = data.checks.map(c => `
    <div class="check-item">
      <span>${c.name}</span>
      <span class="${c.status.toLowerCase()}">${c.status}</span>
    </div>
  `).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="card" style="border-left: 8px solid ${color}">
      <h2 style="color:${color}; margin-top:0;">${data.verdict}</h2>
      <pAh, security caught us! That error happened because as soon as an API key is shared in a public conversation or code block, Google's automated scanners flag it as "leaked" and disable it to protect your account from unauthorized charges.

Since that specific key is now permanently blocked, I’ve updated the code below to use the latest **Gemini 3.1 Flash** model (released earlier this year) and removed the hardcoded key so you can safely enter a **new** one directly into the app.

### How to get back online:
1.  **Generate a new key:** Go to [Google AI Studio](https://aistudio.google.com/) and create a fresh API key.
2.  **Revoke the old one:** While you're there, delete the one that was leaked so it doesn't clutter your dashboard.
3.  **Paste it in:** Run the code below, paste your new key into the box, and click **"Save Key."**
